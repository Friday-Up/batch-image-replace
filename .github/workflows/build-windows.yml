name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium
        run: |
          playwright install chromium

      - name: Build with PyInstaller
        shell: pwsh
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --name "JD-BatchImageReplace" `
            --collect-all playwright `
            --collect-all webview `
            --hidden-import pandas `
            --hidden-import openpyxl `
            --hidden-import src.config `
            --hidden-import src.core `
            --hidden-import src.gui `
            main.py

      - name: Copy browsers to output
        shell: pwsh
        run: |
          $src = python -c "import os, playwright; print(os.path.join(os.path.dirname(playwright.__file__), '.driver'))"
          $dst = "dist/JD-BatchImageReplace/_internal/playwright/.driver"
          if (Test-Path $src) {
            Copy-Item -Path $src -Destination $dst -Recurse -Force
            Write-Host "Copied .driver from $src to $dst"
          }
          $browserSrc = python -c "from playwright.sync_api import sync_playwright; p=sync_playwright().start(); path=p.chromium.executable_path; p.stop(); print(path)"
          $browserDir = Split-Path $browserSrc -Parent
          $browserRoot = Split-Path (Split-Path $browserDir -Parent) -Parent
          $browserDst = "dist/JD-BatchImageReplace/_internal/ms-playwright"
          if (Test-Path $browserRoot) {
            Copy-Item -Path $browserRoot -Destination $browserDst -Recurse -Force
            Write-Host "Copied browsers from $browserRoot to $browserDst"
          }

      - name: Compress output
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/JD-BatchImageReplace" -DestinationPath "dist/京准通批量换图-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 京准通批量换图-Windows
          path: dist/京准通批量换图-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/京准通批量换图-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
