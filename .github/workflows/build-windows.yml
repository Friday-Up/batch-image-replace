name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium to local dir
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "0"
          playwright install chromium

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --name "JD-BatchImageReplace" `
            --collect-all playwright `
            --collect-all webview `
            --hidden-import pandas `
            --hidden-import openpyxl `
            --hidden-import src.config `
            --hidden-import src.core `
            --hidden-import src.gui `
            main.py

      - name: Verify output structure
        shell: pwsh
        run: |
          Get-ChildItem -Path "dist/JD-BatchImageReplace/_internal" -Recurse -Filter "chrome.exe" | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          Get-ChildItem -Path "dist/JD-BatchImageReplace/_internal" -Recurse -Filter "ms-playwright" | ForEach-Object { Write-Host "Found dir: $($_.FullName)" }

      - name: Compress output
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/JD-BatchImageReplace" -DestinationPath "dist/京准通批量换图-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 京准通批量换图-Windows
          path: dist/京准通批量换图-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/京准通批量换图-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
